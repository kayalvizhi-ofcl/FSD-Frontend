<!doctype html>
<html>
  <head>
    <title>Label Example</title>
  </head>
  <body>
    <h2>Contact Form</h2>

    <form>
      <label for="name">Name:</label><br />
      <input type="text" id="name" placeholder="Enter your name" /><br /><br />

      <label for="email">Email:</label><br />
      <input
        type="email"
        id="email"
        placeholder="Enter your email"
      /><br /><br />

      <input type="submit" />
    </form>
  </body>
</html>
