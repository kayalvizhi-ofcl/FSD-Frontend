<!doctype html>
<html>
  <head>
    <title>Validation Form</title>
  </head>
  <body>
    <h2>Validation Example</h2>

    <form>
      <label>Email:</label><br />
      <input type="email" required /><br /><br />

      <label>Age (18 - 60):</label><br />
      <input type="number" min="18" max="60" required /><br /><br />

      <input type="submit" />
    </form>
  </body>
</html>
