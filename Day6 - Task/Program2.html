<!doctype html>
<html>
  <head>
    <title>Input Types</title>
  </head>
  <body>
    <h2>Survey Form</h2>

    <form>
      <p>Gender:</p>

      <input type="radio" name="gender" /> Male<br />
      <input type="radio" name="gender" /> Female<br /><br />

      <p>Hobbies:</p>

      <input type="checkbox" /> Reading<br />
      <input type="checkbox" /> Music<br />
      <input type="checkbox" /> Sports<br /><br />

      <label>Age:</label><br />
      <input type="number" /><br /><br />

      <input type="submit" />
    </form>
  </body>
</html>
