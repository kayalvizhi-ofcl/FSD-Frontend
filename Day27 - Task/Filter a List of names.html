<!DOCTYPE html>
<html>
<head>
  <title>Filter Names</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }
    input {
      padding: 10px;
      width: 200px;
      margin-bottom: 10px;
    }
    li {
      padding: 5px;
    }
  </style>
</head>
<body>

<h2>Filter Names</h2>

<input type="text" id="searchBox" placeholder="Type a name...">

<ul id="nameList">
  <li>John</li>
  <li>Jane</li>
  <li>Michael</li>
  <li>Sarah</li>
  <li>David</li>
  <li>Emma</li>
</ul>

<script>
  const searchBox = document.getElementById("searchBox");
  const listItems = document.querySelectorAll("#nameList li");

  searchBox.addEventListener("keyup", function() {
    const searchValue = this.value.toLowerCase();

    listItems.forEach(function(item) {
      const text = item.textContent.toLowerCase();

      if (text.includes(searchValue)) {
        item.style.display = "block";
      } else {
        item.style.display = "none";
      }
    });
  });
</script>

</body>
</html>
