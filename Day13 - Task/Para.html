<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>REM Example</title>
    <style>
        p {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <h2>Learning REM Units</h2>
    <p>

    </p>
