<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Media Query Example</title>
    <style>
        body {
            background-color: lightgreen;
        }

        @media (max-width: 768px) {
            body {
                background-color: lightcoral;
            }
        }
    </style>
</head>
<body>

    <h2 style="text-align:center;">Resize the screen</h2>
    <p style="text-align:center;">
        Background color changes when screen width is below 768px.
    </p>

</body>
</html>
