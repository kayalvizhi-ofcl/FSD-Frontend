<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Responsive Box</title>
    <style>
        .box {
            width: 80%;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: lightblue;
            border: 2px solid black;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>Welcome!</h2>
        <p>This box takes 80% of the screen width but never exceeds 600px.</p>
    </div>

</body>
</html>
