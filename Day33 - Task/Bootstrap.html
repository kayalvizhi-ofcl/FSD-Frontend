<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Basics</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- Task 1: Container -->
  <div class="container bg-light p-4 mt-4">

    <!-- Task 2: Typography -->
    <h1 class="text-center text-primary mb-4">Welcome to Bootstrap</h1>

    <h2 class="text-success">Sub Heading</h2>

    <p class="text-muted mt-3">
      This is a sample paragraph using Bootstrap text utilities.
    </p>

    <!-- Spacing Example -->
    <div class="bg-warning p-3 mt-4">
      <p class="mb-0">
        This box uses padding (p-3) and margin-top (mt-4).
      </p>
    </div>

    <div class="bg-info text-white p-4 mt-3">
      <p class="mb-0">
        Another section styled using spacing and color utilities.
      </p>
    </div>

  </div>

</body>
</html>
