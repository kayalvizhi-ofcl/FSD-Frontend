<!DOCTYPE html>
<html>
<head>
    <title>KKR vs CSK Theme</title>
</head>
<body id="mainBody">

<div id="box">CSK</div>

<script>
    // Apply KKR theme to body
    document.getElementById("mainBody").style.backgroundColor = "purple";
    document.getElementById("mainBody").style.color = "gold";
    document.getElementById("mainBody").style.textAlign = "center";
    document.getElementById("mainBody").style.padding = "50px";

    // Style CSK box
    let box = document.getElementById("box");
    box.style.backgroundColor = "yellow";
    box.style.color = "black";
    box.style.width = "200px";
    box.style.height = "200px";
    box.style.margin = "auto";
    box.style.display = "flex";
    box.style.alignItems = "center";
    box.style.justifyContent = "center";
    box.style.fontSize = "30px";
    box.style.borderRadius = "15px";
    box.style.boxShadow = "0px 0px 15px black";
</script>

</body>
</html>
