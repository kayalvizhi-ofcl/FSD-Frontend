<!doctype html>
<html>
  <head>
    <title>Class attribute</title>
    <style>
      .common {
        color: blue;
        font-size: 20px;
      }
    </style>
  </head>

  <body>
    <h2 class="common">Heading One</h2>
    <p class="common">Paragraph One</p>
    <p class="common">Paragraph Two</p>
  </body>
</html>
