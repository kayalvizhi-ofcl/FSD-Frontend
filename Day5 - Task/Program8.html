<!doctype html>
<html>
  <head>
    <title>Images Practice</title>
  </head>

  <body>
    <h2>Image with Width and Height</h2>
    <img src="image3.jpg" width="200" height="200" alt="Sample" />

    <h2>Responsive Image</h2>
    <img
      src="image3.jpg"
      style="max-width: 100%; height: auto"
      alt="Responsive Image"
    />

    <h2>Clickable Image</h2>
    <a href="https://i.pinimg.com/736x/2e/c3/25/2ec3253305ed65fe55aaf497f964f24e.jpg">
      <img src="image3.jpg" width="200" alt="Clickable Image" />
    </a>
  </body>
</html>
