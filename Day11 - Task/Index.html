<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Methods Demo</title>

    <!-- Internal CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            display: flex;
            justify-content: space-around;
            margin: 30px;
            gap: 20px;
        }

        /* Internal CSS Section */
        .internal {
            background-color: #d0ebff;
            border-left: 6px solid #1c7ed6;
            padding: 20px;
            width: 30%;
            border-radius: 8px;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>CSS Styling Methods</h1>
        <p>Inline vs Internal vs External</p>
    </header>

    <div class="container">

        <!-- Inline CSS -->
        <div style="background-color:#ffe3e3; border-left:6px solid #e03131; padding:20px; width:30%; border-radius:8px;">
            <h2>Inline CSS</h2>
            <p>This section is styled directly inside the HTML tag using the style attribute.</p>
        </div>

        <!-- Internal CSS -->
        <div class="internal">
            <h2>Internal CSS</h2>
            <p>This section is styled using the &lt;style&gt; tag inside the HTML file.</p>
        </div>

        <!-- External CSS -->
        <div class="external">
            <h2>External CSS</h2>
            <p>This section is styled using an external stylesheet file.</p>
        </div>

    </div>

</body>
</html>
