<!DOCTYPE html>
<html>
<head>
  <title>Nested Grid</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
  <div class="row">
    
    <div class="col-md-6 bg-info p-3">
      Main Column

      <!-- Nested Row -->
      <div class="row mt-3">
        <div class="col-6 bg-warning p-2">
          Sub Column 1
        </div>
        <div class="col-6 bg-secondary text-white p-2">
          Sub Column 2
        </div>
      </div>

    </div>

    <div class="col-md-6 bg-primary p-3">
      Another Column
    </div>

  </div>
</div>

</body>
</html>
